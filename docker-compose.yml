services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      Auth__Provider: ${Auth__Provider:-mock}
      Auth__Mock__SigningKey: ${Auth__Mock__SigningKey}
      Auth__Auth0__Domain: ${Auth__Auth0__Domain}
      Auth__Auth0__Audience: ${Auth__Auth0__Audience}
      App__DefaultCourseId: ${App__DefaultCourseId}
    networks:
      - app-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_AUTH_PROVIDER: ${NEXT_PUBLIC_AUTH_PROVIDER:-mock}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-mock}
      API_URL: http://api:8080
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_SECRET: ${AUTH0_SECRET}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
    networks:
      - app-net
    depends_on:
      api:
        condition: service_healthy

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data:
